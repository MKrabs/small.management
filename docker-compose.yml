services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-smallmanagement}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - /mnt/Toshiba/small.management/postgres:/var/lib/postgresql/data
    networks:
      - internal
    restart: unless-stopped

  backend:
    build: ./backend
    env_file: .env
    depends_on:
      - db
    networks:
      - internal
    restart: unless-stopped

  web:
    build: ./frontend
    depends_on:
      - backend
    networks:
      - internal
      - nginx_default
    restart: unless-stopped

networks:
  internal:
    internal: true
  nginx_default:
    external: true
